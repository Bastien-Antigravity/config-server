services:
  # --- Infrastructure ---
  config-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/bastien-antigravity/config-server:${TAG:-latest}
    container_name: config-server
    restart: unless-stopped
    volumes:
      # If the service needs to read/write config files, mount a volume
      - ./config:/config
    networks:
      - teleremote_network
    labels: [ com.centurylinklabs.watchtower.enable=true ]

networks:
  teleremote_network:
    external: true
